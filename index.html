<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dreamhouse — Naomi & Jana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #1a0a1a;
      font-family: 'Outfit', sans-serif;
      cursor: default;
    }

    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
    }

    canvas {
      display: block;
      width: 100%; height: 100%;
    }

    /* Loading screen */
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: linear-gradient(135deg, #FF69B4 0%, #FF00FF 50%, #8B5CF6 100%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    #loading-screen h1 {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      color: white;
      text-shadow: 0 0 40px rgba(255,255,255,0.3);
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    #loading-screen p {
      color: rgba(255,255,255,0.8);
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .loading-bar-container {
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin-top: 2rem;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      background: white;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Title overlay when viewing full house */
    #house-title {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #house-title h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: white;
      text-shadow: 0 2px 20px rgba(255,105,180,0.5);
      letter-spacing: 0.08em;
    }

    #house-title p {
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    /* Back button */
    #back-button {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 100;
      background: rgba(255, 105, 180, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 105, 180, 0.3);
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
    }

    #back-button:hover {
      background: rgba(255, 105, 180, 0.3);
      border-color: rgba(255, 105, 180, 0.6);
    }

    #back-button.visible {
      opacity: 1;
      visibility: visible;
    }

    /* Room label */
    #room-label {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s ease;
    }

    #room-label.visible {
      opacity: 1;
      visibility: visible;
    }

    #room-label h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: white;
      text-shadow: 0 2px 20px rgba(255,105,180,0.5);
    }

    #room-label p {
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      z-index: 50;
      background: rgba(255, 105, 180, 0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 105, 180, 0.4);
      color: white;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }

    #tooltip.visible {
      opacity: 1;
    }

    /* Project overlay */
    #project-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 200;
      background: rgba(0, 0, 0, 0);
      backdrop-filter: blur(0px);
      opacity: 0;
      visibility: hidden;
      transition: all 0.6s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #project-overlay.visible {
      opacity: 1;
      visibility: visible;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
    }

    .project-card {
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 100%);
      border: 1px solid rgba(255, 105, 180, 0.2);
      border-radius: 20px;
      padding: 3rem;
      max-width: 700px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      transform: translateY(30px);
      transition: transform 0.5s ease;
    }

    #project-overlay.visible .project-card {
      transform: translateY(0);
    }

    .project-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: #FF69B4;
      margin-bottom: 0.3rem;
    }

    .project-card .project-brand {
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .project-card .project-body {
      color: rgba(255,255,255,0.8);
      font-size: 1rem;
      line-height: 1.7;
    }

    .project-card .project-body p {
      margin-bottom: 1rem;
    }

    .project-card .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .project-card .project-tags span {
      background: rgba(255, 105, 180, 0.15);
      border: 1px solid rgba(255, 105, 180, 0.3);
      color: #FF69B4;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .project-card .project-credits {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
    }

    .project-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(255, 105, 180, 0.15);
      border: 1px solid rgba(255, 105, 180, 0.3);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .project-close:hover {
      background: rgba(255, 105, 180, 0.3);
    }

    /* Hint text at bottom */
    #hint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(255,255,255,0.4);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
  </style>
  <script type="module" crossorigin src="/dreamhouse-beta/assets/index-PrkFyTrD.js"></script>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading-screen">
    <h1>Dreamhouse</h1>
    <p>Naomi & Jana</p>
    <div class="loading-bar-container">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
  </div>

  <!-- House title -->
  <div id="house-title">
    <h1>Dreamhouse</h1>
    <p>Click a room to explore</p>
  </div>

  <!-- Back button -->
  <button id="back-button">← Back</button>

  <!-- Room label -->
  <div id="room-label">
    <h2 id="room-label-title"></h2>
    <p>Click an object to view project</p>
  </div>

  <!-- Tooltip -->
  <div id="tooltip"></div>

  <!-- Hint -->
  <div id="hint">Click a room to explore</div>

  <!-- Project overlay -->
  <div id="project-overlay">
    <button class="project-close" id="project-close">×</button>
    <div class="project-card" id="project-card"></div>
  </div>

  <!-- 3D Canvas -->
  <div id="canvas-container"></div>

</body>
</html>
